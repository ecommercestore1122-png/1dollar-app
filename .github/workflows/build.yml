name: Build Android APK - FINAL FIX
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - run: npm install
      
      - name: BUILD VITE
        run: npm run build
        
      - name: CHECK DIST
        run: |
          echo "=== DIST INDEX.HTML ==="
          cat dist/index.html
          ls -la dist/assets/
          
      - run: npm install @capacitor/core@5 @capacitor/cli@5 @capacitor/android@5
      
      - name: DELETE OLD ANDROID
        run: rm -rf android
      
      - name: ADD ANDROID PLATFORM
        run: npx cap add android
        
      - name: SYNC - YE CONFIG.TS USE KARE GA
        run: npx cap sync android
        
      - name: VERIFY APK CONTENT
        run: |
          echo "=== APK MEIN KYA GAYA ==="
          cat android/app/src/main/assets/public/index.html
          echo "=== APP NAME ==="
          grep -r "1 Dollar Product" android/ || echo "Name not found"
      
      - name: BUILD APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: 1Dollar-Product-FINAL
          path: android/app/build/outputs/apk/debug/app-debug.apk
