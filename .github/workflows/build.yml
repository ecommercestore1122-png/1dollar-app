name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - run: npm install
      - run: npm run build
      - run: npm install @capacitor/core @capacitor/cli @capacitor/android
      - run: npx cap init "1DollarApp" "com.onedollar.app" --web-dir=dist
      - run: npx cap add android
      - run: npx cap sync android

      - name: Build APK with Java 17
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug -Dorg.gradle.java.home=$JAVA_HOME
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}

      - uses: actions/upload-artifact@v4
        with:
          name: 1Dollar-App-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
