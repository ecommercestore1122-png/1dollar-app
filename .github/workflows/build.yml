name: Build Android APK - FINAL DEBUG
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - run: npm install
      
      - name: 1. VITE BUILD KARO
        run: npm run build
        
      - name: 2. DIST CHECK KARO - SABSE ZAROORI
        run: |
          echo "=== DIST FOLDER ==="
          ls -la dist/
          echo "=== INDEX.HTML KA SIZE ==="
          wc -c dist/index.html
          echo "=== INDEX.HTML KE ANDAR ==="
          head -20 dist/index.html
          
      - run: npm install @capacitor/core@5 @capacitor/cli@5 @capacitor/android@5
      
      - name: 3. PURANA ANDROID DELETE KARO
        run: rm -rf android
        
      - run: npx cap init "1DollarApp" "com.onedollar.app" --web-dir=dist
      - run: npx cap add android
      
      - name: 4. COPY + VERIFY
        run: |
          npx cap copy android
          echo "=== APK MEIN KYA GAYA ==="
          ls -la android/app/src/main/assets/public/
          echo "=== APK WALA INDEX.HTML ==="
          cat android/app/src/main/assets/public/index.html
      
      - name: 5. BUILD APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: 1Dollar-App-DEBUG
          path: android/app/build/outputs/apk/debug/app-debug.apk
